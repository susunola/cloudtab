# Drop this at .github/workflows/cloudtab.yml in your Terraform repo.
name: cloudtab

on:
  pull_request:
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/cloudtab.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  estimate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: susunola/cloudtab@v0
        env:
          TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENTCLOUD_SECRET_ID }}
          TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
          # AWS credentials (optional — only needed if your plan has aws_* resources)
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # Alibaba Cloud credentials (optional — only needed for alicloud_* resources)
          ALIBABA_ACCESS_KEY_ID: ${{ secrets.ALIBABA_ACCESS_KEY_ID }}
          ALIBABA_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_ACCESS_KEY_SECRET }}
          # Huawei Cloud credentials (optional — only needed for huaweicloud_* resources)
          HUAWEI_ACCESS_KEY_ID: ${{ secrets.HUAWEI_ACCESS_KEY_ID }}
          HUAWEI_SECRET_ACCESS_KEY: ${{ secrets.HUAWEI_SECRET_ACCESS_KEY }}
          HUAWEI_PROJECT_ID: ${{ secrets.HUAWEI_PROJECT_ID }}
        with:
          path: "infra/"
          region: "ap-guangzhou"
          base-ref: "${{ github.event.pull_request.base.ref }}"
